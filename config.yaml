# Web Application Configuration
web:
  name: "Anti-Manipulation Guardrails"
  version: "1.0.0"
  description: "MSc Project - Testing defensive prompt engineering against emotional manipulation of LLMs"
  author: "Your Name"
  
# Server Configuration
server:
  host: "0.0.0.0"
  port: 5000
  debug: true
  
# API Configuration
api:
  rate_limit: "100 per hour"
  default_timeout: 30  # seconds
  
# Security
security:
  secret_key: "change-this-in-production-secret-key"
  cors_origins: ["*"]
  
# Paths
paths:
  data_dir: "data/"
  results_dir: "data/results/"
  logs_dir: "logs/"
  
# Features
features:
  enable_batch_experiments: true
  enable_real_time_analysis: true
  max_prompt_length: 1000